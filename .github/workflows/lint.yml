name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: zad5/client

      - name: Run ESLint
        run: npx eslint src
        working-directory: zad5/client

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint
          ./ktlint zad3/src/**/*.kt || true

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: zad4
          version: latest
          args: ./...